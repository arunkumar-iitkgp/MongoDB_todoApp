# =============================================================================
#  MongoDB Service — Internal ClusterIP for Todo App to connect
# =============================================================================
#  Exposes MongoDB on an internal ClusterIP so the Todo app can reach it
#  at the DNS name: todo-mongodb:27017 (within the same namespace)
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: todo-mongodb
  namespace: todo-app
  labels:
    app: todo-app
    component: mongodb
spec:
  type: ClusterIP
  ports:
    - port: 27017
      targetPort: 27017
      protocol: TCP
      name: mongodb
  selector:
    app: todo-app
    component: mongodb
