# =============================================================================
#  Todo App Service — Expose the app within and outside the cluster
# =============================================================================
#  Two services:
#    1. todo-app (ClusterIP) — Internal access for other services/Ingress
#    2. todo-app-nodeport (NodePort) — Direct external access for development
# =============================================================================

# ---------------------------------------------------------------------------
#  Internal Service — ClusterIP
#  Accessible within the cluster at: http://todo-app:3000
#  Use with Ingress controller for production traffic routing.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: todo-app
  namespace: todo-app
  labels:
    app: todo-app
    component: api
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: todo-app
    component: api

---
# ---------------------------------------------------------------------------
#  External Service — NodePort
#  Direct access from outside the cluster (for dev/testing only).
#  Access at: http://<node-ip>:<NodePort>
#
#  For production, use an Ingress controller instead (see ingress.yml example
#  at the bottom of this file, or use a cloud load balancer).
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: todo-app-nodeport
  namespace: todo-app
  labels:
    app: todo-app
    component: api
    exposure: external
spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30080  # Access at http://<node-ip>:30080
      protocol: TCP
      name: http
  selector:
    app: todo-app
    component: api

